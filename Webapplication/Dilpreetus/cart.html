<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb | Ihr Shopname</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">...</header>

<main class="content container">
    <h1>Ihr Warenkorb</h1>

    <div class="cart-layout">
        <section class="cart-items-list">
            <article class="cart-item">
                <img src="path/to/product_img.jpg" alt="Produktname" class="item-image">
                <div class="item-details">
                    <a href="/product-detail.html">Produktname A</a>
                    <p class="item-price">Preis: 49,99 €</p>
                    <div class="item-actions">
                        <input type="number" value="1" min="1" class="item-quantity">
                        <button class="btn-remove">Entfernen</button>
                    </div>
                </div>
            </article>

        </section>

        <aside class="cart-summary">
            <h2>Zusammenfassung</h2>
            <div class="summary-line">
                <span>Zwischensumme:</span>
                <span class="summary-value" id="subtotal">99,98 €</span>
            </div>
            <div class="summary-line">
                <span>Versand:</span>
                <span class="summary-value">Kostenlos</span>
            </div>
            <div class="summary-total">
                <strong>Gesamtbetrag:</strong>
                <strong class="summary-value" id="total-price">99,98 €</strong>
            </div>

            <a href="/Dilpreetus/checkout.html" class="btn btn-primary btn-checkout">Zur Kasse gehen</a>
            <a href="/Dilpreetus/index.html" class="btn btn-secondary btn-continue-shopping">Weiter einkaufen</a>
        </aside>
    </div>

</main>

<footer class="site-footer">...</footer>
</body>
</html>
