<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden | Ihr Shopname</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<main class="login-container">
    <header class="login-header">
        <h1>Kunden-Login</h1>
        <p>Greifen Sie auf Ihr Konto zu, um Bestellungen einzusehen und den Warenkorb zu speichern.</p>
    </header>

    <form action="/login" method="POST" class="login-form">
        <div class="form-group">
            <label for="email">E-Mail-Adresse</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <div class="form-options">
            <a href="/Dilpreetus/reset-password.html" class="forgot-password-link">Passwort vergessen?</a>
        </div>

        <button type="submit" class="btn btn-primary">Anmelden</button>

        <div class="register-link-area">
            <p>Noch kein Konto?</p>
            <a href="/Dilpreetus/register.html" class="btn btn-secondary">Jetzt registrieren</a>
        </div>
    </form>
</main>
</body>
</html>
